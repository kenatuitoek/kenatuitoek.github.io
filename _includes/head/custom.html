{% include base_path %}

<!-- Fonts -->
 

<!-- Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- Favicon -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#080C1A"/>

<!-- Custom Portfolio Styles -->
<style>
  /* ─── Override base typography ─── */
  /* body {
    font-family: 'times', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif !important;
  } --> */
  body {
    font-family: 'Times New Roman', Times, Georgia, serif !important;
  }

  code, pre, .highlight, .language-python, .language-stata, .language-r {
    font-family: 'JetBrains Mono', Monaco, Consolas, monospace !important;
    font-size: 0.85em;
  }

  /* ─── Dark theme refinements ─── */
  [data-theme="dark"] {
    --bg-secondary: rgba(255, 255, 255, 0.03);
    --border-color: rgba(255, 255, 255, 0.08);
  }

  /* ─── Smooth scroll ─── */
  html { scroll-behavior: smooth; }

  /* ─── Masthead / nav polish ─── */
  .masthead {
    border-bottom: 1px solid rgba(255,255,255,0.06) !important;
    backdrop-filter: blur(12px);
  }

  .greedy-nav a {
    font-family: 'JetBrains Mono', monospace !important;
    font-size: 0.75em !important;
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }

  /* ─── Page title ─── */
  .page__title {
    font-weight: 600;
    letter-spacing: -0.5px;
  }

  /* ─── Archive items (portfolio cards) ─── */
  .archive__item-title a {
    text-decoration: none !important;
  }
  .archive__item-title a:hover {
    color: #5B8DEF !important;
  }

  /* ─── Code blocks ─── */
  div.highlight, pre.highlight {
    border-radius: 8px !important;
    border: 1px solid rgba(255,255,255,0.06) !important;
  }

  /* ─── Tables ─── */
  table {
    border-collapse: collapse;
    width: 100%;
    font-size: 0.9em;
  }
  table th {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8em;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ─── Buttons ─── */
  .btn--primary {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8em;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-radius: 6px;
    padding: 0.6em 1.4em;
  }

  /* ─── Author sidebar refinements ─── */
  .author__name {
    font-weight: 600 !important;
    letter-spacing: -0.3px;
  }
  .author__bio {
    font-size: 0.85em !important;
    line-height: 1.5 !important;
    opacity: 0.8;
  }
  .author__urls li a {
    font-size: 0.85em;
  }

  /* ─── Portfolio card hover effect ─── */
  .portfolio-card-full:hover {
    transform: translateX(4px);
    box-shadow: -3px 0 12px rgba(91, 141, 239, 0.08);
  }

  /* ─── Content area max-width for readability ─── */
  .page__content p,
  .page__content li {
    max-width: 680px;
    line-height: 1.7;
  }

  /* ─── Smooth animation for page elements ─── */
  .page__content {
    animation: fadeSlideUp 0.4s ease both;
  }
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ─── Tag/tool badges ─── */
  .page__content code {
    font-size: 0.82em;
    padding: 1px 5px;
    border-radius: 3px;
  }

  /* ─── Footer cleanup ─── */
  .page__footer {
    border-top: 1px solid rgba(255,255,255,0.06) !important;
  }
</style>
